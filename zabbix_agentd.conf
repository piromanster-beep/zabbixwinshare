# Zabbix Agent configuration for Backup Disks monitoring
# Place this in zabbix_agentd.conf or add to existing config

Server=YOUR_ZABBIX_SERVER_IP
ServerActive=YOUR_ZABBIX_SERVER_IP
Hostname=YOUR_HOSTNAME

Timeout=30

# Check disk accessibility via UNC path (1=OK, 0=FAIL)
UserParameter=disk.access[*],powershell -ExecutionPolicy Bypass -Command "& { $d='$1'; $unc = (net use $d | Select-String '\\\S+').Matches.Value; if (-not $unc) { Write-Output 0; exit }; $test = Test-Path \"$unc\*\" -ErrorAction SilentlyContinue; if ($test) { Write-Output 1 } else { Write-Output 0 } }"

# Discover network drives F: through Y:
UserParameter=disk.discover,powershell -ExecutionPolicy Bypass -Command "$d=@(); net use | ForEach-Object { if ($_ -match '(\w:)\s') { $l=$matches[1]; if ($l -match '^[F-Z]:$') { $d += @{'{#DISK}'=$l} } } }; Write-Output (ConvertTo-Json -InputObject @{data=$d} -Compress)"

# Get share name for a drive (e.g. "buhback")
UserParameter=disk.unc.path[*],powershell -ExecutionPolicy Bypass -Command "(net use $1 | Select-String '\\\S+').Matches.Value -replace '.*\\', ''"
